<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<title>متجر الملابس</title>
<style>
body{
  font-family: Arial;
  direction: rtl;
  background:#f4f4f4;
  margin:0;
}

header{
  background:#000;
  color:#fff;
  text-align:center;
  padding:15px;
}

.container{
  display:flex;
  flex-wrap:wrap;
  justify-content:center;
  gap:15px;
  padding:15px;
}

.card{
  background:#fff;
  width:220px;
  border-radius:10px;
  padding:10px;
  text-align:center;
}

img{
  width:100%;
  height:160px;
  object-fit:cover;
  border-radius:10px;
}

button{
  width:100%;
  padding:7px;
  margin-top:5px;
  background:black;
  color:white;
  border:none;
  cursor:pointer;
}

#cart{
  background:#fff;
  margin:15px;
  padding:15px;
  border-radius:10px;
}
input{
  width:100%;
  padding:8px;
  margin:5px 0;
}
</style>
</head>

<body>

<header>
<h1>🛍️ متجر الملابس الاحترافي</h1>
</header>

<div class="container" id="products"></div>

<div id="cart">
<h2>🧺 السلة</h2>
<ul id="cartList"></ul>

<input id="name" placeholder="اسم الزبون">
<input id="phone" placeholder="رقم الهاتف">
<input id="address" placeholder="العنوان">

<button onclick="sendOrder()">📦 إرسال الطلب</button>
</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import { getFirestore, collection, getDocs, addDoc } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyCu-ZLIqFgvZSEm8KSn7Seh1X9lnHhGSh0",
  authDomain: "shop-clothes-224a3.firebaseapp.com",
  projectId: "shop-clothes-224a3",
  storageBucket: "shop-clothes-224a3.firebasestorage.app",
  messagingSenderId: "348817058494",
  appId: "1:348817058494:web:dddc00d386edf6f1350cef"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

let cart = [];

async function loadProducts(){
  const snap = await getDocs(collection(db,"products"));
  const container = document.getElementById("products");

  snap.forEach(doc=>{
    let p = doc.data();

    container.innerHTML += `
      <div class="card">
        <img src="${p.image}">
        <h3>${p.name}</h3>
        <p>${p.price} دج</p>
        <button onclick='addToCart("${p.name}",${p.price})'>إضافة للسلة</button>
      </div>
    `;
  });
}

window.addToCart = function(name, price){
  cart.push({name,price});
  renderCart();
}

function renderCart(){
  let list = document.getElementById("cartList");
  list.innerHTML = "";

  cart.forEach(i=>{
    list.innerHTML += `<li>${i.name} - ${i.price} دج</li>`;
  });
}

window.sendOrder = async function(){

  let name = document.getElementById("name").value;
  let phone = document.getElementById("phone").value;
  let address = document.getElementById("address").value;

  if(cart.length === 0){
    alert("السلة فارغة");
    return;
  }

  if(!name || !phone || !address){
    alert("أكمل بياناتك");
    return;
  }

  let total = cart.reduce((sum,i)=>sum+i.price,0);

  await addDoc(collection(db,"orders"),{
    name,
    phone,
    address,
    items: cart,
    total,
    date: new Date()
  });

  alert("تم إرسال الطلب بنجاح 🎉");

  cart = [];
  renderCart();
}

loadProducts();

</script>

</body>
</html>
